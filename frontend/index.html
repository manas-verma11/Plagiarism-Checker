<!DOCTYPE html>
<html>

<head>
    <title>Code Similarity Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>LeetCode Style Code Similarity Checker</h1>

    <div class="container">
        <textarea id="code1" placeholder="Paste Code 1 here..."></textarea>
        <textarea id="code2" placeholder="Paste Code 2 here..."></textarea>
    </div>

    <button onclick="checkSimilarity()">Check Similarity</button>

    <div id="output">
        <h2 id="result"></h2>
        <pre id="highlight"></pre>
    </div>

    <script src="script.js"></script>

</body>

</html>
